<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Test — SG Trailers</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0D0C0B; color:#fff; font-family:'Barlow Condensed', sans-serif; overflow:hidden; }

  #canvas-wrap {
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  #viewer { width:100%; height:100%; display:block; }

  #ui {
    position:fixed;
    bottom:32px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
    z-index:10;
  }

  .color-btn {
    padding:10px 24px;
    border-radius:100px;
    border:1px solid rgba(255,255,255,.2);
    background:rgba(255,255,255,.07);
    color:#fff;
    font-family:'Barlow Condensed', sans-serif;
    font-size:13px;
    letter-spacing:.15em;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .2s;
  }
  .color-btn:hover { border-color:#E8B800; color:#E8B800; }
  .color-btn.active { background:#E8B800; color:#000; border-color:#E8B800; }

  #info {
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    font-size:12px;
    letter-spacing:.15em;
    text-transform:uppercase;
    color:rgba(255,255,255,.4);
    z-index:10;
  }

  #loading {
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:#0D0C0B;
    z-index:100;
    gap:16px;
  }
  #loading p {
    font-size:13px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(255,255,255,.5);
  }
  .spinner {
    width:40px; height:40px;
    border:2px solid rgba(232,184,0,.2);
    border-top-color:#E8B800;
    border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading model...</p>
</div>

<div id="canvas-wrap">
  <canvas id="viewer"></canvas>
</div>

<div id="info">Drag to rotate · Scroll to zoom</div>

<div id="ui">
  <button class="color-btn active" onclick="setColor('#1a1a1a', this)">Matte Black</button>
  <button class="color-btn" onclick="setColor('#6b6b6b', this)">Nardo Gray</button>
  <button class="color-btn" onclick="setColor('#f0f0f0', this)">White</button>
  <button class="color-btn" onclick="setColor('#B52200', this)">Custom (Red)</button>
</div>

<!-- Three.js CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0D0C0B);

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
camera.position.set(0, 0.5, 3); // vista frontal centrada

// Renderer
const canvas = document.getElementById('viewer');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 0.5;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);

// Limitar ángulo vertical — no sube ni baja demasiado
controls.minPolarAngle = Math.PI * 0.25;
controls.maxPolarAngle = Math.PI * 0.55;

// Limitar rotación horizontal — máximo 3/4 de cada lado, no da vuelta completa
controls.minAzimuthAngle = -Math.PI * 0.45; // ~80° hacia la izquierda
controls.maxAzimuthAngle = Math.PI * 0.45;  // ~80° hacia la derecha

// HDRI Environment (reflections + lighting)
const rgbeLoader = new RGBELoader();
rgbeLoader.load('hdri/autoshop_01_2k.hdr', (texture) => {
  texture.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = texture;
  // scene.background = texture; // descomenta si quieres ver el HDRI de fondo
});

// Luz suave base — el HDRI ya ilumina, esto solo rellena sombras
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Track paintable meshes
let paintMeshes = [];
const currentColor = new THREE.Color(0x1a1a1a);

// Load GLB
const loader = new GLTFLoader();
loader.load(
  'models/trailer_logo.glb',
  (gltf) => {
    const model = gltf.scene;

    // Center and scale model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.5 / maxDim;

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    scene.add(model);

    // Collect meshes for color changing
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;

        // Clone material so we can modify it
        if (child.material) {
          child.material = child.material.clone();
          // Mark as paintable (you can filter by name if needed)
          paintMeshes.push(child);
        }
      }
    });

    // Apply initial color
    applyColor(currentColor);

    // Hide loading
    document.getElementById('loading').style.display = 'none';

    // Log mesh names for reference
    console.log('Meshes found:');
    paintMeshes.forEach(m => console.log(' -', m.name));
  },
  (progress) => {
    const pct = Math.round((progress.loaded / progress.total) * 100);
    document.querySelector('#loading p').textContent = `Loading... ${pct}%`;
  },
  (error) => {
    console.error('Error loading GLB:', error);
    document.querySelector('#loading p').textContent = 'Error loading model';
  }
);

// Apply color to all meshes
function applyColor(color) {
  paintMeshes.forEach(mesh => {
    if (mesh.material.color) {
      mesh.material.color.set(color);
    }
  });
}

// Global color setter (called from buttons)
window.setColor = function(hex, btn) {
  currentColor.set(hex);
  applyColor(currentColor);

  // Update active button
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
